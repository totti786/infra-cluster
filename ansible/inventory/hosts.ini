[all:vars]
ansible_user=root
ansible_python_interpreter=/usr/bin/python3
environment=production

[load_balancers]
lb-1 ansible_host=10.0.0.1
lb-2 ansible_host=10.0.0.2
lb-3 ansible_host=10.0.0.3

[applications]
app-1 ansible_host=10.0.1.1
app-2 ansible_host=10.0.1.2
app-3 ansible_host=10.0.1.3

[databases]
db-primary ansible_host=10.0.2.1 postgres_role=primary
db-replica ansible_host=10.0.2.2 postgres_role=replica

[redis_cluster]
redis-1 ansible_host=10.0.2.3 redis_port=6379
redis-2 ansible_host=10.0.2.4 redis_port=6379
redis-3 ansible_host=10.0.2.5 redis_port=6379

[cluster:children]
load_balancers
applications
databases
redis_cluster
