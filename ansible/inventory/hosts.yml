all:
  vars:
    ansible_user: root
    ansible_python_interpreter: /usr/bin/python3
    environment: production
    domain: example.com
    floating_ip: 203.0.113.100
    postgres_version: "15"
    redis_version: "7"
    
  children:
    load_balancers:
      hosts:
        lb-1:
          ansible_host: 10.0.0.1
          keepalived_priority: 100
          keepalived_state: MASTER
        lb-2:
          ansible_host: 10.0.0.2
          keepalived_priority: 90
          keepalived_state: BACKUP
        lb-3:
          ansible_host: 10.0.0.3
          keepalived_priority: 80
          keepalived_state: BACKUP
          
    applications:
      hosts:
        app-1:
          ansible_host: 10.0.1.1
          app_port: 3000
        app-2:
          ansible_host: 10.0.1.2
          app_port: 3000
        app-3:
          ansible_host: 10.0.1.3
          app_port: 3000
          
    databases:
      hosts:
        db-primary:
          ansible_host: 10.0.2.1
          postgres_role: primary
          postgres_replication_user: replicator
        db-replica:
          ansible_host: 10.0.2.2
          postgres_role: replica
          postgres_primary_host: 10.0.2.1
          
    redis_cluster:
      hosts:
        redis-1:
          ansible_host: 10.0.2.3
          redis_cluster_port: 6379
          redis_cluster_bus_port: 16379
        redis-2:
          ansible_host: 10.0.2.4
          redis_cluster_port: 6379
          redis_cluster_bus_port: 16379
        redis-3:
          ansible_host: 10.0.2.5
          redis_cluster_port: 6379
          redis_cluster_bus_port: 16379
