---
- name: Configure Load Balancer Nodes
  hosts: load_balancers
  become: yes
  serial: 1
  
  roles:
    - common
    - docker
    - traefik
    - keepalived
    
  tasks:
    - name: Create traefik config directory
      file:
        path: /etc/traefik/dynamic
        state: directory
        owner: root
        group: root
        mode: '0755'
    
    - name: Create letsencrypt directory
      file:
        path: /etc/traefik/letsencrypt
        state: directory
        owner: root
        group: root
        mode: '0700'
    
    - name: Create traefik log directory
      file:
        path: /var/log/traefik
        state: directory
        owner: root
        group: root
        mode: '0755'
      
    - name: Copy traefik static config
      template:
        src: templates/traefik.yml.j2
        dest: /etc/traefik/traefik.yml
        owner: root
        group: root
        mode: '0644'
      notify: restart traefik
      
    - name: Copy traefik dynamic config
      template:
        src: templates/traefik-dynamic.yml.j2
        dest: /etc/traefik/dynamic/dynamic.yml
        owner: root
        group: root
        mode: '0644'
      notify: reload traefik
      
    - name: Copy docker-compose for traefik
      template:
        src: templates/traefik-compose.yml.j2
        dest: /opt/traefik/docker-compose.yml
        owner: root
        group: root
        mode: '0640'
      
    - name: Configure keepalived
      template:
        src: templates/keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: '0640'
      notify: restart keepalived
      
    - name: Create traefik health check script
      copy:
        content: |
          #!/bin/bash
          curl -sf http://localhost:8080/ping || exit 1
        dest: /usr/local/bin/check-traefik.sh
        owner: root
        group: root
        mode: '0755'
      
    - name: Ensure services are running
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - keepalived
        - docker
      
    - name: Start traefik container
      docker_compose:
        project_src: /opt/traefik
        state: present
        pull: yes

  handlers:
    - name: reload traefik
      command: docker exec traefik traefik reload
      
    - name: restart traefik
      docker_compose:
        project_src: /opt/traefik
        state: restarted
        
    - name: restart keepalived
      systemd:
        name: keepalived
        state: restarted
