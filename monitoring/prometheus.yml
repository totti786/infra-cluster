global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ha-vps-cluster'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '10.0.0.1:9100'
          - '10.0.0.2:9100'
          - '10.0.0.3:9100'
          - '10.0.1.1:9100'
          - '10.0.1.2:9100'
          - '10.0.1.3:9100'
          - '10.0.2.1:9100'
          - '10.0.2.2:9100'
          - '10.0.2.3:9100'
          - '10.0.2.4:9100'
          - '10.0.2.5:9100'

  - job_name: 'nginx'
    static_configs:
      - targets:
          - '10.0.0.1:9113'
          - '10.0.0.2:9113'
          - '10.0.0.3:9113'

  - job_name: 'postgres'
    static_configs:
      - targets:
          - '10.0.2.1:9187'
          - '10.0.2.2:9187'

  - job_name: 'redis'
    static_configs:
      - targets:
          - '10.0.2.3:9121'
          - '10.0.2.4:9121'
          - '10.0.2.5:9121'

  - job_name: 'docker'
    static_configs:
      - targets:
          - '10.0.1.1:9323'
          - '10.0.1.2:9323'
          - '10.0.1.3:9323'

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://example.com/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
