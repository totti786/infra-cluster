groups:
  - name: ha-cluster-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% for 5 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% for 5 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is above 85% on {{ $labels.instance }}."

      - alert: TraefikDown
        expr: traefik_config_reloads_total == 0 or absent(trajik_config_reloads_total)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Traefik down on {{ $labels.instance }}"
          description: "Traefik is not responding."

      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL down on {{ $labels.instance }}"
          description: "PostgreSQL is not responding."

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag_seconds > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL replication lag high"
          description: "Replication lag is above 30 seconds."

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis down on {{ $labels.instance }}"
          description: "Redis is not responding."

      - alert: RedisClusterDown
        expr: redis_cluster_state != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis cluster is not healthy"
          description: "Redis cluster state is not OK."

      - alert: KeepalivedDown
        expr: node_systemd_unit_state{name="keepalived.service",state="active"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Keepalived down on {{ $labels.instance }}"
          description: "Keepalived service is not running."

      - alert: VIPNotAssigned
        expr: node_network_address_assignments{device="eth0"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "VIP not assigned to any node"
          description: "Floating IP is not assigned to any load balancer."
